services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dcnet
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dcnet_dev}
      POSTGRES_DB: dcnet
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcnet -d dcnet"]
      interval: 5s
      timeout: 5s
      retries: 10

  fall_detection_web:
    build: ./fall_detection_web
    env_file:
      - path: ./fall_detection_web/.env
        required: false
    environment:
      DATABASE_URL: postgresql://dcnet:${DB_PASSWORD:-dcnet_dev}@postgres:5432/dcnet
      # Live view: browser iframes go2rtc stream.html. Dev publishes go2rtc on
      # localhost:1984 (prod fronts it via Caddy). Must be browser-reachable.
      GO2RTC_URL: ${GO2RTC_URL:-http://localhost:1984}
    volumes:
      - fdw_data:/app/data
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  go2rtc:
    image: alexxit/go2rtc:latest
    env_file:
      - path: ./.env
        required: false
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml:ro
      - go2rtc_data:/config
    ports:
      - "1984:1984"   # browser reaches stream.html here (dev only)
    restart: unless-stopped

  event_collector:
    build: ./services/event_collector
    env_file:
      - path: ./services/event_collector/.env
        required: false
    environment:
      DATABASE_URL: postgresql://dcnet:${DB_PASSWORD:-dcnet_dev}@postgres:5432/dcnet
      MQTT_HOST: ${MQTT_HOST:-camera-test.dcnet.vn}
      MQTT_PORT: ${MQTT_PORT:-8883}
      MQTT_TLS: ${MQTT_TLS:-true}
      MQTT_USER: ${MQTT_USER:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-event_collector_cameraai}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  reid_worker:
    build: ./services/reid_worker
    profiles: ["reid"]
    env_file:
      - path: ./.env
        required: false
    environment:
      DATABASE_URL: postgresql://dcnet:${DB_PASSWORD:-dcnet_dev}@postgres:5432/dcnet
      MQTT_HOST: ${MQTT_HOST:-camera-test.dcnet.vn}
      MQTT_PORT: ${MQTT_PORT:-8883}
      MQTT_TLS: ${MQTT_TLS:-true}
      MQTT_USER: ${MQTT_USER:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_CLIENT_ID: reid_worker_cameraai
      REID_FACE_ENABLED: "false"
      REID_TOPIC: poc/objsnap
      DATA_DIR: /app/data
    volumes:
      - fdw_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  fdw_data:
  go2rtc_data:
